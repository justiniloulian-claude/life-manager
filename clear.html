<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clearing cache…</title>
  <style>
    body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #fff; }
    p { font-size: 18px; color: #333; }
  </style>
</head>
<body>
  <p id="msg">Clearing old cache…</p>
  <script>
    async function clearAll() {
      // Unregister all service workers
      if ('serviceWorker' in navigator) {
        var regs = await navigator.serviceWorker.getRegistrations();
        for (var r of regs) await r.unregister();
      }
      // Clear all caches
      if ('caches' in window) {
        var keys = await caches.keys();
        for (var k of keys) await caches.delete(k);
      }
      document.getElementById('msg').textContent = 'Done! Redirecting…';
      setTimeout(function() {
        window.location.replace('./index.html?nocache=' + Date.now());
      }, 1000);
    }
    clearAll();
  </script>
</body>
</html>
